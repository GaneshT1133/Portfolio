<section class="minimal-page projects-page" appReveal>
  <div class="watermark">PROJECTS.</div>
  
  <div class="content-wrapper">
    <h2 class="section-title">Projects.</h2>

    <div class="cw-grid">
      @for (item of items; track item.name; let i = $index) {
        <div class="cw-card" [class.staggered]="i % 2 !== 0" appReveal [revealDelay]="i * 100">
          <div class="card-number">0{{ i + 1 }}</div>
          
          <div class="card-header">
            <h3 class="card-title">{{ item.name }}</h3>
            <a class="view-btn" aria-label="View Project">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
            </a>
          </div>
          
          <div class="card-body">
            <p class="card-desc">{{ item.summary }}</p>
            <p class="card-impact"><strong>Impact:</strong> {{ item.impact }}</p>
          </div>
          
          <div class="card-footer">
            <div class="tech-stack">
              @for (tech of item.stack.split('|'); track tech) {
                <span class="tech-tag">{{ tech.trim() }}</span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
