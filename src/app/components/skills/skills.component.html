<section class="skills-wrap" id="skills">
  <div class="skills section">
    <div class="skills-title" appReveal>
      <p><span class="title-icon">🔗</span> SKILLS</p>
      <div class="title-line"></div>
    </div>

    <div class="skills-grid">
      @for (category of categories; track category.title) {
        <article class="skill-card" appReveal [revealDelay]="100 + ($index * 70)">
          <h3>{{ category.title }}</h3>
          <hr class="card-divider" />
          <div class="logo-grid">
            @for (skill of category.items; track skill.name) {
              <div class="logo-item">
                <img [src]="skill.iconUrl" [alt]="skill.name" loading="lazy" />
                <span>{{ skill.name }}</span>
              </div>
            }
          </div>
        </article>
      }
    </div>
  </div>
</section>
