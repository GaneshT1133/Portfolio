<div class="minimal-page">
  <div class="watermark" aria-hidden="true">Skills.</div>
  
  <div class="content-wrapper">
    <h2 class="section-title" appReveal>Technical Arsenal.</h2>
    
    <div class="skills-grid">
      @for (category of categories; track category.title) {
        <div class="skill-category" appReveal [revealDelay]="100 + ($index * 70)">
          <h3 class="category-title">{{ category.title }}</h3>
          <div class="skill-items">
            @for (skill of category.items; track skill.name) {
              <div class="skill-pill">
                <img [src]="skill.iconUrl" [alt]="skill.name" loading="lazy" class="skill-icon" />
                <span class="skill-name">{{ skill.name }}</span>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</div>
