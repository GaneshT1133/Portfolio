<section class="minimal-page about-page" appReveal>
  <div class="watermark">ABOUT ME.</div>
  
  <div class="content-wrapper">
    <div class="timeline-container">
      <h2 class="section-title">EXPERIENCE</h2>
      
      <div class="cw-timeline">
        @for (item of items; track item.title) {
          <div class="cw-node">
            <div class="cw-dot"></div>
            <div class="cw-content">
              <h3 class="role">{{ item.title }}</h3>
              <p class="desc">{{ item.detail }}</p>
            </div>
          </div>
        }
      </div>

    </div>
  </div>
</section>
